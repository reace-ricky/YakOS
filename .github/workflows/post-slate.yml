name: Post-Slate Feedback

on:
  schedule:
    - cron: '30 6 * * *'  # 6:30 AM UTC = 1:30 AM EDT (after all games finish)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        type: choice
        options:
          - "post-slate"
          - "backfill"
      sport:
        description: "Sport (post-slate mode only)"
        required: false
        type: choice
        options:
          - "NBA"
          - "PGA"
      date:
        description: "Slate date (YYYY-MM-DD, blank = today, post-slate mode only)"
        required: false
        type: string
      extra_args:
        description: "Extra CLI flags for backfill mode, e.g. --force --dates 2026-03-14 2026-03-15"
        required: false
        type: string

jobs:
  feedback:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run nightly calibration (scheduled)
        if: github.event_name == 'schedule'
        env:
          RAPIDAPI_KEY: ${{ secrets.TANK01_API_KEY }}
          TANK01_API_KEY: ${{ secrets.TANK01_API_KEY }}
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)
          echo "Running nightly calibration for $YESTERDAY (all sports)"
          python scripts/nightly_calibration.py --date "$YESTERDAY" --sport all

      - name: Run post-slate feedback (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'post-slate'
        env:
          RAPIDAPI_KEY: ${{ secrets.TANK01_API_KEY }}
          TANK01_API_KEY: ${{ secrets.TANK01_API_KEY }}
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd scripts
          CMD="python post_slate.py --sport ${{ inputs.sport }}"
          if [ -n "${{ inputs.date }}" ]; then
            CMD="$CMD --date ${{ inputs.date }}"
          fi
          echo "Running: $CMD"
          eval $CMD

      - name: Run backfill (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'backfill'
        env:
          RAPIDAPI_KEY: ${{ secrets.TANK01_API_KEY }}
          TANK01_API_KEY: ${{ secrets.TANK01_API_KEY }}
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CMD="python scripts/nightly_calibration.py --backfill"
          if [ -n "${{ inputs.extra_args }}" ]; then
            CMD="$CMD ${{ inputs.extra_args }}"
          fi
          echo "Running: $CMD"
          eval $CMD
